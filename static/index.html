<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneClickML</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4" defer></script>
  <script src="/static/app.js" defer></script>
</head>
<body>
  <div class="wrap">
    <!-- верхняя строка -->
    <header class="top">
      <div class="brand">ONECLICKML</div>
      <p class="intro">Automatic feature analysis tool.<br />Upload a dataset, find what predicts the outcome.</p>
      <nav class="nav">
        <span class="active">&bull; Analyze</span>
      </nav>
      <a class="contact" href="https://github.com/scaredofthesix/OneClickML" target="_blank">GitHub</a>
    </header>

    <!-- гигантский заголовок -->
    <h1 class="hero">PREDICT</h1>

    <!-- строка управления -->
    <div class="bar">
      <div class="bar__left">
        <label class="upload" id="drop">
          <input type="file" id="file" accept=".csv" hidden />
          <span id="dropText">[ UPLOAD CSV ]</span>
        </label>
      </div>
      <div class="bar__right">
        <span class="mono-label">TARGET</span>
        <select id="target" disabled></select>
        <button id="run" class="run" disabled>RUN</button>
        <span class="status" id="status"></span>
      </div>
    </div>
    <hr class="rule" />

    <!-- результаты -->
    <main class="results" id="results" hidden>
      <!-- лучший признак — первым -->
      <section class="best">
        <span class="best__label">BEST PREDICTIVE FEATURE</span>
        <span class="best__name" id="bestFeature">—</span>
        <span class="best__score" id="bestScore">—</span>
      </section>

      <!-- график + карточки признаков -->
      <div class="grid">
        <article class="card card--wide">
          <div class="card__chart"><canvas id="chart"></canvas></div>
          <div class="card__meta">
            <span class="card__title" id="chartTitle">—</span>
            <span class="card__cat">RELATIONSHIP</span>
          </div>
        </article>
        <!-- карточки признаков добавляются скриптом -->
      </div>

      <!-- предсказание нового значения -->
      <section class="predict">
        <div class="predict__head">PREDICT NEW VALUE</div>
        <div class="predict__inputs" id="predictInputs"></div>
        <button id="predictBtn" class="run">PREDICT</button>
        <div class="predict__out" id="predictOut"></div>
      </section>
    </main>

    <footer class="foot">
      <span>OneClickML</span>
      <span id="footInfo">Regression &amp; classification, auto-detected</span>
    </footer>
  </div>
</body>
</html>
